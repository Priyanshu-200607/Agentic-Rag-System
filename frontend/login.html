<!DOCTYPE html><html class="light" lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Nexus RAG - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com" rel="preconnect">

<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&amp;family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e0e3e5",
                        "surface-dim": "#d8dadc",
                        "primary": "#3525cd",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#3c475a",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container": "#eceef0",
                        "surface-container-highest": "#e0e3e5",
                        "on-secondary-fixed-variant": "#3f465c",
                        "on-surface": "#191c1e",
                        "secondary-fixed-dim": "#bec6e0",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#111c2d",
                        "primary-container": "#4f46e5",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#566175",
                        "on-primary-fixed": "#0f0069",
                        "on-tertiary-container": "#d1dcf4",
                        "surface-tint": "#4d44e3",
                        "secondary-container": "#dae2fd",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#131b2e",
                        "secondary": "#565e74",
                        "surface-bright": "#f7f9fb",
                        "secondary-fixed": "#dae2fd",
                        "on-secondary-container": "#5c647a",
                        "tertiary-fixed": "#d8e3fb",
                        "on-primary-container": "#dad7ff",
                        "primary-fixed-dim": "#c3c0ff",
                        "tertiary-fixed-dim": "#bcc7de",
                        "surface-container-high": "#e6e8ea",
                        "tertiary": "#3e495d",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-surface-variant": "#464555",
                        "on-secondary": "#ffffff",
                        "background": "#f7f9fb",
                        "inverse-surface": "#2d3133",
                        "outline": "#777587",
                        "primary-fixed": "#e2dfff",
                        "inverse-primary": "#c3c0ff",
                        "surface": "#f7f9fb",
                        "error": "#ba1a1a",
                        "outline-variant": "#c7c4d8",
                        "on-background": "#191c1e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "margin-desktop": "40px",
                        "container-max": "1440px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "stack-lg": "32px",
                        "stack-sm": "8px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {

                        "display-lg": ["Inter"],

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        
        .input-glass {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.2s ease;
        }
        
        .input-glass:focus-within {
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
            background: rgba(255, 255, 255, 0.9);
        }
        
        /* Subtle animated background */
        .bg-tech-gradient {
            background: linear-gradient(135deg, #0a0f2c 0%, #1e1b4b 100%);
            position: relative;
            overflow: hidden;
        }
        
        .bg-tech-gradient::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(53, 37, 205, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(79, 70, 229, 0.1) 0%, transparent 50%);
            z-index: 0;
        }
    </style>
</head>
<body class="bg-tech-gradient min-h-screen flex items-center justify-center p-4 md:p-8 font-sans antialiased text-on-surface">
<div class="relative z-10 w-full max-w-md glass-panel rounded-xl p-8 md:p-10 flex flex-col gap-stack-lg">
<!-- Header -->
<div class="text-center flex flex-col items-center gap-stack-sm">
<div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined text-on-primary text-2xl" style="font-variation-settings: 'FILL' 1;">
                    dataset
                </span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">RAG</h1>
<p class="font-body-md text-body-md text-secondary">Intelligence Engine</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault(); login();">
<!-- Email Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="username">User Id&nbsp;</label>
<div class="input-glass rounded-xl flex items-center px-4 py-3 h-14">
<span class="material-symbols-outlined text-secondary mr-3">person</span>
<input class="bg-transparent border-none w-full p-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0" id="username" placeholder="user name" required="" type="text">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="input-glass rounded-xl flex items-center px-4 py-3 h-14">
<span class="material-symbols-outlined text-secondary mr-3">lock</span>
<input class="bg-transparent border-none w-full p-0 font-body-md text-body-md text-on-surface placeholder:text-outline-variant focus:ring-0" id="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<div class="flex justify-end mt-[-8px]">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Contact Admin<br></a>
</div>
<!-- Submit Button -->
<button class="mt-4 bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md h-14 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-sm" type="submit">
                Sign In
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Footer / SSO -->
<div class="flex flex-col gap-stack-md mt-2">
<div class="flex items-center gap-4">
<div class="h-px bg-surface-variant flex-1"></div>
<span class="font-label-md text-label-md text-secondary">Or continue with</span>
<div class="h-px bg-surface-variant flex-1"></div>
</div>
<button class="bg-transparent border border-outline-variant hover:bg-surface-container-low text-on-surface font-label-md text-label-md h-12 rounded-xl flex items-center justify-center gap-2 transition-colors">
<span class="material-symbols-outlined text-secondary">business</span>
                Enterprise SSO
            </button>
</div>
</div>


<script src="js/login.js"></script>
</body></html>
