<script>
    // Micro-interactions for buttons
    document.querySelectorAll('button').forEach(button => {
      button.addEventListener('mousedown', () => {
        button.style.transform = 'scale(0.96)';
      });
      button.addEventListener('mouseup', () => {
        button.style.transform = 'scale(1)';
      });
      button.addEventListener('mouseleave', () => {
        button.style.transform = 'scale(1)';
      });
    });

    // File upload mock interactivity
    const fileLabel = document.querySelector('label[for="file-upload"]');
    const fileInput = document.getElementById('file-upload');
    
    if (fileInput) {
      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          fileLabel.querySelector('p').textContent = e.target.files[0].name;
          fileLabel.querySelector('span').textContent = 'check_circle';
          fileLabel.querySelector('span').style.color = '#2e7d32';
        }
      });
    }
  </script>

<script>
    const username = localStorage.getItem('username');
    const role = localStorage.getItem('role');
    
    if (!username || (role !== 'admin' && role !== 'manager')) {
        window.location.href = 'login.html';
    }

    function logout() {
        localStorage.removeItem('username');
        localStorage.removeItem('role');
        window.location.href = 'login.html';
    }

    async function loadAdminHistory() {
        try {
            const response = await fetch(`http://127.0.0.1:8000/history?username=${encodeURIComponent(username)}`);
            const data = await response.json();
            const container = document.getElementById('uploadHistoryContainer');
            container.innerHTML = '';

            let filteredHistory = data.history || [];
            
            if (filteredHistory.length === 0) {
                container.innerHTML = "<p class='text-xs text-on-surface-variant px-2'>No files uploaded yet.</p>";
                return;
            }

            const grouped = {};
            filteredHistory.forEach(item => {
                if (!grouped[item.department]) {
                    grouped[item.department] = [];
                }
                grouped[item.department].push(item);
            });

            for (const [dept, files] of Object.entries(grouped)) {
                let filesHtml = files.map(f => `
                    <div class="flex justify-between items-center py-1.5 border-b border-outline-variant/10 last:border-0">
                        <span class="text-[11px] text-on-surface truncate pr-2" title="${f.filename}">📄 ${f.filename}</span>
                        <button onclick="deleteFile('${dept}', '${f.filename}')" class="text-error hover:text-red-700 shrink-0">
                            <span class="material-symbols-outlined text-[14px]">delete</span>
                        </button>
                    </div>
                `).join('');

                container.innerHTML += `
                    <details class="bg-white/50 rounded-lg border border-outline-variant/20 overflow-hidden group">
                        <summary class="flex justify-between items-center p-2 cursor-pointer list-none hover:bg-surface-container-low transition-colors">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-warning text-sm group-open:rotate-90 transition-transform">chevron_right</span>
                                <span class="text-xs font-medium uppercase">${dept} <span class="text-on-surface-variant opacity-60">(${files.length})</span></span>
                            </div>
                            <button onclick="clearDepartment(event, '${dept}')" class="text-[10px] text-error font-bold border border-error/20 px-1 rounded hover:bg-error-container shrink-0">Clear</button>
                        </summary>
                        <div class="px-3 pb-2 pt-1 bg-surface-container-lowest/50">
                            ${filesHtml}
                        </div>
                    </details>
                `;
            }
        } catch (err) {
            console.error("Failed to load history", err);
        }
    }

    async function deleteFile(dept, filename) {
        if (!confirm(`Remove ${filename} from ${dept}?`)) return;
        try {
            const response = await fetch(`http://127.0.0.1:8000/upload/${dept}/${filename}`, {
                method: 'DELETE',
                headers: { 'x-username': username }
            });
            const data = await response.json();
            if (data.status === 'success') loadAdminHistory();
        } catch (err) {
            alert("Error deleting file.");
        }
    }

    async function clearDepartment(event, dept) {
        event.preventDefault(); 
        if (!confirm(`Clear all files from ${dept}?`)) return;
        try {
            const response = await fetch(`http://127.0.0.1:8000/upload/${dept}`, {
                method: 'DELETE',
                headers: { 'x-username': username }
            });
            const data = await response.json();
            if (data.status === 'success') loadAdminHistory();
        } catch (err) {
            alert("Error clearing department.");
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Update header role dynamically
        const headerRole = document.getElementById('headerRole');
        if (headerRole) headerRole.textContent = (role || 'USER').toUpperCase();

        // Load My Access badges from backend
        fetch(`http://127.0.0.1:8000/history?username=${encodeURIComponent(username)}`)
            .then(r => r.json())
            .then(data => {
                const badgeContainer = document.getElementById('myAccessBadges');
                if (badgeContainer && data.allowed && data.allowed.length > 0) {
                    badgeContainer.innerHTML = data.allowed
                        .map(d => `<span class="px-2 py-1 bg-secondary-container text-on-secondary-container rounded text-[10px] font-bold">${d.toUpperCase()}</span>`)
                        .join('');
                } else if (badgeContainer) {
                    badgeContainer.innerHTML = '<span class="text-xs text-on-surface-variant">None</span>';
                }
            }).catch(() => {});

        loadAdminHistory();
        loadAdminData();
        populateSidebarUploadDropdown();

        // File label update on file selection
        const fileInput = document.getElementById('file-upload');
        const fileLabel = document.getElementById('fileLabel');
        if (fileInput && fileLabel) {
            fileInput.addEventListener('change', () => {
                fileLabel.textContent = fileInput.files.length > 0
                    ? `${fileInput.files.length} file(s) selected`
                    : 'Browse or drag files';
            });
        }
    });

    async function loadAdminData() {
        const authHeader = { 'x-username': username, 'Cache-Control': 'no-cache' };

        // Departments
        const deptRes = await fetch(`http://127.0.0.1:8000/admin/departments?t=${Date.now()}`, { headers: authHeader });
        const departments = await deptRes.json();
        const deptBody = document.getElementById('deptTableBody');
        deptBody.innerHTML = '';
        for(let d in departments) {
            let status = departments[d].status;
            let isActive = status === 'active';
            
            let statusSpan = isActive 
                ? '<span class="px-3 py-1 bg-success-container text-on-success-container rounded-full text-xs font-bold">active</span>'
                : '<span class="px-3 py-1 bg-warning-container text-on-warning-container rounded-full text-xs font-bold">suspended</span>';
                
            let actionBtn = isActive
                ? `<button onclick="toggleDeptSuspend('${d}')" class="bg-warning text-black/80 px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-warning-container transition-colors">Suspend</button>`
                : `<button onclick="toggleDeptSuspend('${d}')" class="bg-success text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:opacity-90 transition-colors">Activate</button>`;

            deptBody.innerHTML += `
            <tr class="hover:bg-surface-container-low/30 transition-colors">
                <td class="px-6 py-4 font-medium uppercase">${d}</td>
                <td class="px-6 py-4">${statusSpan}</td>
                <td class="px-6 py-4">${actionBtn}</td>
            </tr>`;
        }

        // Users
        const userRes = await fetch(`http://127.0.0.1:8000/admin/users?t=${Date.now()}`, { headers: authHeader });
        const users = await userRes.json();
        const userBody = document.getElementById('usersTableBody');
        userBody.innerHTML = '';
        for(let u in users) {
            let status = users[u].status || 'active';
            let isActive = status === 'active';
            
            let statusSpan = isActive 
                ? '<span class="px-3 py-1 bg-success-container text-on-success-container rounded-full text-xs font-bold">active</span>'
                : '<span class="px-3 py-1 bg-warning-container text-on-warning-container rounded-full text-xs font-bold">suspended</span>';
                
            let actionBtn = isActive
                ? `<button onclick="toggleUserSuspend('${u}')" class="bg-warning text-black/80 px-3 py-1.5 rounded text-xs font-bold hover:bg-warning-container transition-colors">Suspend</button>`
                : `<button onclick="toggleUserSuspend('${u}')" class="bg-success text-white px-3 py-1.5 rounded text-xs font-bold hover:opacity-90 transition-colors">Activate</button>`;

            let deleteBtn = `<button onclick="deleteUser('${u}')" class="bg-error text-white px-3 py-1.5 rounded text-xs font-bold hover:bg-red-700 transition-colors">Delete</button>`;

            userBody.innerHTML += `
            <tr class="hover:bg-surface-container-low/30 transition-colors">
                <td class="px-6 py-4 font-bold">${u}</td>
                <td class="px-6 py-4">${users[u].role}</td>
                <td class="px-6 py-4">
                    <div class="flex items-center gap-2">
                        <input id="acc_${u}" class="bg-white border border-outline-variant/30 rounded px-2 py-1 text-xs w-32 focus:outline-none focus:ring-1 focus:ring-primary" type="text" value="${(users[u].allowed_departments || []).join(',')}">
                        <button onclick="updateAccess('${u}')" class="bg-primary text-white p-1.5 rounded hover:bg-primary-container transition-colors">
                            <span class="material-symbols-outlined text-[14px]">save</span>
                        </button>
                    </div>
                </td>
                <td class="px-6 py-4">${statusSpan}</td>
                <td class="px-6 py-4">
                    <div class="flex gap-2">
                        ${actionBtn}
                        ${deleteBtn}
                    </div>
                </td>
            </tr>`;
        }
    }

    // FIX: /suspend endpoint TOGGLES — no separate /activate endpoint exists
    async function toggleDeptSuspend(name) {
        await fetch(`http://127.0.0.1:8000/admin/departments/${name}/suspend`, { method: 'PUT', headers: { 'x-username': username }});
        loadAdminData();
    }

    async function toggleUserSuspend(name) {
        await fetch(`http://127.0.0.1:8000/admin/users/${name}/suspend`, { method: 'PUT', headers: { 'x-username': username }});
        loadAdminData();
    }

    async function deleteUser(name) {
        if(!confirm(`Delete user ${name}?`)) return;
        await fetch(`http://127.0.0.1:8000/admin/users/${name}`, { method: 'DELETE', headers: { 'x-username': username }});
        loadAdminData();
    }

    async function updateAccess(name) {
        const val = document.getElementById(`acc_${name}`).value;
        const depts = val.split(',').map(s => s.trim()).filter(s => s);
        await fetch(`http://127.0.0.1:8000/admin/users/${name}/access`, { 
            method: 'PUT', 
            headers: { 'Content-Type': 'application/json', 'x-username': username },
            body: JSON.stringify({ allowed_departments: depts })
        });
        loadAdminData();
    }

    async function addDepartment() {
        const nameInput = document.getElementById('newDeptInput');
        if(!nameInput) return;
        const name = nameInput.value.trim().toLowerCase();
        if(!name) return;
        const res = await fetch(`http://127.0.0.1:8000/admin/departments/${name}`, {
            method: 'POST',
            headers: { 'x-username': username }
        });
        const data = await res.json();
        if (data.status === 'success') {
            nameInput.value = '';
            loadAdminData();
            populateSidebarUploadDropdown();
        } else {
            alert('Failed to create department: ' + (data.detail || 'Unknown error'));
        }
    }

    async function addUser() {
        const uInput = document.getElementById('newUsername');
        const pInput = document.getElementById('newUserPassword');
        const rSelect = document.getElementById('newUserRole');
        const aInput = document.getElementById('newUserAccess');

        if(!uInput || !pInput || !rSelect || !aInput) return;

        const newUser = uInput.value.trim().toLowerCase();  // not named 'username' to avoid shadowing
        const password = pInput.value.trim();
        const roleVal = rSelect.value;                      // not named 'role' to avoid shadowing
        const access = aInput.value.trim();
        const allowed = access ? access.split(',').map(s => s.trim()).filter(s => s) : [];

        if(!newUser || !password) {
            alert("Username and password required");
            return;
        }

        const response = await fetch(`http://127.0.0.1:8000/admin/users`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-username': username },  // 'username' = logged-in admin
            body: JSON.stringify({
                username: newUser,
                password: password,
                role: roleVal,
                allowed_departments: allowed
            })
        });

        const data = await response.json();
        if (data.status === 'success') {
            uInput.value = '';
            pInput.value = '';
            aInput.value = '';
            loadAdminData();
        } else {
            alert('Failed to create user: ' + (data.detail || 'Unknown error'));
        }
    }

    async function populateSidebarUploadDropdown() {
        const res = await fetch(`http://127.0.0.1:8000/admin/departments?t=${Date.now()}`, { headers: { 'x-username': username }});
        const departments = await res.json();
        const select = document.getElementById('sidebarUploadDept');
        select.innerHTML = '<option value="" disabled selected>Select Department...</option>';
        for (let d in departments) {
            if (departments[d].status === 'active') {
                select.innerHTML += `<option value="${d}">${d.toUpperCase()}</option>`;
            }
        }
    }

    async function sidebarUpload() {
        const dept = document.getElementById('sidebarUploadDept').value;
        const fileInput = document.getElementById('file-upload');
        const statusDiv = document.getElementById('sidebarUploadStatus');

        if (!dept) { statusDiv.textContent = 'Please select a department.'; statusDiv.style.color = 'red'; return; }
        if (fileInput.files.length === 0) { statusDiv.textContent = 'Please select files.'; statusDiv.style.color = 'red'; return; }

        statusDiv.textContent = 'Uploading...';
        statusDiv.style.color = '#3525cd';

        const formData = new FormData();
        formData.append('department', dept);
        for (let f of fileInput.files) formData.append('files', f);

        try {
            const res = await fetch('http://127.0.0.1:8000/upload', {
                method: 'POST',
                headers: { 'x-username': username },
                body: formData
            });
            const data = await res.json();
            if (data.status === 'success') {
                statusDiv.textContent = 'Upload successful!';
                statusDiv.style.color = '#2e7d32';
                fileInput.value = '';
                document.getElementById('fileLabel').textContent = 'Browse or drag files';
                loadAdminHistory();
            } else {
                statusDiv.textContent = 'Upload failed.';
                statusDiv.style.color = 'red';
            }
        } catch(e) {
            statusDiv.textContent = 'Error connecting to server.';
            statusDiv.style.color = 'red';
        }
    }
</script>
</body></html>
